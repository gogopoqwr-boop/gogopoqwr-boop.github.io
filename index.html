<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НА_УТРАХ_4 — Конфигуратор</title>
    <!-- Telegram Mini App SDK удален, так как это standalone сайт -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>

            color: #09090b;

        /* ===== DARK MODE ===== */
        body.dark { background-color: #09090b; color: #f4f4f5; }

        body.dark footer { background-color: #09090b !important; border-color: #3f3f46 !important; }

        body.dark .bg-white\/90 { background-color: rgba(9,9,11,0.92) !important; }
        body.dark .bg-zinc-50, body.dark .bg-neutral-50 { background-color: #27272a !important; }
        body.dark .bg-neutral-100 { background-color: #27272a !important; }
        body.dark .bg-neutral-200 { background-color: #3f3f46 !important; }
        body.dark .text-black { color: #f4f4f5 !important; }
        body.dark .text-neutral-500 { color: #a1a1aa !important; }
        body.dark .text-neutral-400 { color: #71717a !important; }
        body.dark .text-neutral-600 { color: #a1a1aa !important; }
        body.dark .text-neutral-700 { color: #d4d4d8 !important; }
        body.dark .text-neutral-800 { color: #e4e4e7 !important; }
        body.dark .border-black { border-color: #e4e4e7 !important; }
        body.dark .border-neutral-300 { border-color: #3f3f46 !important; }
        body.dark .border-neutral-200 { border-color: #27272a !important; }
        body.dark .border-dashed { border-color: #52525b !important; }
        body.dark .no-hover-card { box-shadow: 8px 8px 0px #3f3f46 !important; }
        body.dark .bg-black { background-color: #e4e4e7 !important; color: #09090b !important; }
        body.dark .text-white { color: #09090b !important; }
        body.dark button.bg-black { background-color: #e4e4e7 !important; color: #09090b !important; border-color: #e4e4e7 !important; }
        body.dark button.bg-white { background-color: #18181b !important; color: #d4d4d8 !important; }
        body.dark .bg-yellow-100 { background-color: #422006 !important; border-color: #92400e !important; }
        body.dark .text-yellow-800 { color: #fbbf24 !important; }
        body.dark .bg-red-100 { background-color: #450a0a !important; border-color: #991b1b !important; }
        body.dark .text-red-500 { color: #f87171 !important; }
        body.dark .text-red-800 { color: #fca5a5 !important; }
        body.dark .figma-grid {
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        }
        body.dark input[type="text"] { background-color: #18181b !important; color: #f4f4f5 !important; border-color: #e4e4e7 !important; }
        body.dark input[type="text"]::placeholder { color: #52525b !important; }
        body.dark #checkout-modal > div { background-color: #18181b !important; border-color: #e4e4e7 !important; }
        body.dark #success-toast { background-color: #18181b !important; border-color: #e4e4e7 !important; }

        .dark-toggle { position: relative; width: 44px; height: 24px; cursor: pointer; flex-shrink: 0; }
        .dark-toggle input { display: none; }
        .dark-toggle-track { width: 44px; height: 24px; background: #d4d4d8; border: 2px solid #000; display: flex; align-items: center; padding: 2px; transition: background 0.2s; }

</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden antialiased figma-grid">

    <header class="border-b-2 border-black py-6 px-4 bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 relative">
            <div class="flex items-center gap-4">
                <span class="text-3xl sm:text-4xl text-black cheblyachas-logo">НА_УТРАХ_4</span>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 mt-6">
        <section class="mb-16 bg-white border-4 border-black p-6 md:p-8 shadow-[10px_10px_0px_#000000] relative">
            <div class="absolute -top-3.5 left-4 bg-black text-white text-[9px] font-mono px-2 py-0.5 uppercase">
                &lt;div class="interactive-sandbox"&gt;
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                <!-- Левая колонка (SVG) -->
                <div class="lg:col-span-5 flex flex-col items-center justify-center bg-zinc-50 border-2 border-dashed border-neutral-400 p-6 relative">
                    <svg id="watch-svg-canvas" class="w-72 h-72 sm:w-80 sm:h-80" viewBox="0 0 200 200">
                        <defs>
                            <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ffffff" />
                                <stop offset="30%" stop-color="#cccccc" />
                                <stop offset="70%" stop-color="#777777" />
                                <stop offset="100%" stop-color="#333333" />
                            </linearGradient>
                            <linearGradient id="plastic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#444444" />
                                <stop offset="50%" stop-color="#222222" />
                                <stop offset="100%" stop-color="#111111" />
                            </linearGradient>
                            <pattern id="fabric-pattern" width="6" height="6" patternUnits="userSpaceOnUse">
                                <rect width="6" height="6" fill="#888888" />
                                <line x1="0" y1="0" x2="6" y2="6" stroke="#444444" stroke-width="1.5" />
                                <line x1="6" y1="0" x2="0" y2="6" stroke="#222222" stroke-width="1" />
                            </pattern>
                            <linearGradient id="metal-strap-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#666666" />
                                <stop offset="25%" stop-color="#dddddd" />
                                <stop offset="50%" stop-color="#999999" />
                                <stop offset="75%" stop-color="#eeeeee" />
                                <stop offset="100%" stop-color="#444444" />
                            </linearGradient>
                        </defs>
                        <g id="svg-strap-group"></g>
                        <g id="svg-case-group"></g>
                        <g id="svg-dial-group">
                            <circle cx="100" cy="100" r="46" fill="#ffffff" stroke="#000" stroke-width="1.5" />
                            <g id="dial-text-elements"></g>
                        </g>
                        <text x="100" y="162" id="svg-serial-engraving" font-family="monospace" font-weight="bold" font-size="6" fill="#444" text-anchor="middle" letter-spacing="1">SER. 11111</text>
                    </svg>

                    <div class="mt-4 text-center">
                        <span class="text-neutral-400 font-mono text-[10px] uppercase block">[!] Расчет цены (под спайсом):</span>
                        <div class="flex items-center justify-center gap-2">
                            <span id="configurator-price-display" class="text-3xl font-black text-black">11 111 ₽</span>
                            <span id="custom-text-badge" class="hidden bg-black text-white text-[9px] font-mono px-1.5 py-0.5 uppercase tracking-widest">+6048 ⭐ ЗА КАСТОМ</span>
                        </div>
                    </div>
                </div>

                <!-- Правая колонка (Пульт) -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-mono text-neutral-500 uppercase mb-2">🔌 Срез материала:</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setCaseMaterial('plastic')" id="opt-mat-plastic" class="py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white">Пластик</button>
                                <button onclick="setCaseMaterial('metal')" id="opt-mat-metal" class="py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Металл</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-neutral-500 uppercase mb-2">🛠 Геометрия:</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setCaseShape('round')" id="opt-shape-round" class="py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white">Круглые</button>
                                <button onclick="setCaseShape('square')" id="opt-shape-square" class="py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Квадратные</button>
                            </div>
                        </div>
                    </div>

                    <div class="my-4 p-3 border border-neutral-200 bg-white flex items-center justify-between">
                        <label class="text-xs font-mono text-neutral-700 uppercase font-bold flex items-center gap-2">
                            <input type="checkbox" checked onchange="setHandsVisibility(this.checked)" class="accent-black w-4 h-4">
                            Стрелки-болванки
                        </label>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-mono text-neutral-500 uppercase">🆔 Базовая цена / Серийник:</label>
                            <div class="flex items-center gap-2">
                                <span id="serial-lock-badge" class="hidden text-[9px] font-mono text-white bg-black px-1.5 py-0.5 uppercase tracking-widest">🔒 LOCKED</span>
                                <button id="serial-unlock-btn" onclick="unlockSerial()" class="hidden text-[9px] font-mono border border-neutral-400 text-neutral-500 bg-white px-1.5 py-0.5 uppercase hover:bg-neutral-100">UNLOCK</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-6 gap-2" id="serial-buttons-group">
                            <button onclick="setSerialCode('6043')" id="opt-serial-6043" class="py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white">⭐ 6043</button>
                            <button onclick="setSerialCode('6401')" id="opt-serial-6401" class="py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white">⭐ 6401</button>
                            <button onclick="setSerialCode('8080')" id="opt-serial-8080" class="py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white">⭐ 8080</button>
                            <button onclick="setSerialCode('8407')" id="opt-serial-8407" class="py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white">⭐ 8407</button>
                            <button onclick="setSerialCode('10101')" id="opt-serial-10101" class="py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white">⭐ 10101</button>
                            <button onclick="setSerialCode('11111')" id="opt-serial-11111" class="py-2 px-1 text-xs font-mono font-bold border-2 border-black bg-black text-white">⭐ 11111</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-neutral-500 uppercase mb-2">⛓ Крепление и узел:</label>
                        <div class="grid grid-cols-1 sm:grid-cols-5 gap-2">
                            <button onclick="setStrapType('fabric')" id="opt-strap-fabric" class="py-2 px-1 text-[10px] font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Ткань</button>
                            <button onclick="setStrapType('plastic-solid')" id="opt-strap-plastic-solid" class="py-2 px-1 text-[10px] font-mono font-bold uppercase border-2 border-black bg-black text-white">Пласт Sol</button>
                            <button onclick="setStrapType('plastic-segmented')" id="opt-strap-plastic-segmented" class="py-2 px-1 text-[10px] font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Пласт Seg</button>
                            <button onclick="setStrapType('metal-solid')" id="opt-strap-metal-solid" class="py-2 px-1 text-[10px] font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Мет Sol</button>
                            <button onclick="setStrapType('metal-segmented')" id="opt-strap-metal-segmented" class="py-2 px-1 text-[10px] font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white">Мет Seg</button>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-mono text-neutral-500 uppercase font-bold">✍️ Свой текст (до 12 симв.):</label>
                            <span class="text-[9px] font-mono text-black font-bold uppercase bg-yellow-200 px-1">+6048 ⭐ ДОПЛАТА</span>
                        </div>
                        <div class="flex gap-2 relative">
                            <!-- Ограничили до 12 символов, чтобы база64 не улетела за лимит Телеграма -->
                            <input type="text" id="configurator-text-input" oninput="updateConfiguratorDialText(this.value)" placeholder="Пиши дичь..." maxlength="12" class="flex-grow bg-white border-2 border-black p-3 text-sm rounded-none text-black focus:outline-none focus:ring-1 focus:ring-black font-mono uppercase">
                            <button onclick="resetDialTextToDefault()" class="bg-neutral-200 hover:bg-neutral-300 text-black font-mono px-4 text-xs uppercase border border-black">DEL</button>
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <button id="layout-center-btn" onclick="setTextLayout('center')" class="py-1 px-2 text-[10px] font-mono font-bold uppercase border-2 border-black bg-black text-white">⊙ По центру</button>
                            <button id="layout-circle-btn" onclick="setTextLayout('circle')" class="py-1 px-2 text-[10px] font-mono font-bold uppercase border border-neutral-300 bg-white text-neutral-500">◎ По кругу</button>
                        </div>
                    </div>

                    <div class="pt-2 relative">
                        <button onclick="openConfiguratorCheckout()" class="w-full bg-white text-black font-black uppercase py-4 border-4 border-black tracking-wider text-base shadow-[5px_5px_0px_#000000] hover:bg-black hover:text-white transition-colors">
                            ОТПРАВИТЬ СБОРКУ В СДЭК_v2.0
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Модальное окно оформления предзаказа -->
    <div id="checkout-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white border-4 border-black p-6 max-w-md w-full rounded-none shadow-[10px_10px_0px_#000000] relative">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-2xl font-black uppercase text-black">ЗАЯВКА НА СБОРКУ</h3>
                <button onclick="closeCheckout()" class="text-neutral-400 hover:text-black text-2xl font-black">&times;</button>
            </div>
            
            <div class="mb-4 p-3 bg-neutral-50 border-2 border-dashed border-neutral-300">
                <p class="text-lg font-black text-black" id="modal-model-name">КАСТОМНАЯ СБОРКА</p>
                <div class="text-xs text-neutral-600 mt-2 space-y-0.5 font-mono" id="modal-model-details"></div>
            </div>

            <div class="space-y-2">
                <button type="button" onclick="submitStandaloneOrder()" id="tma-order-btn"
                    class="w-full bg-black text-white font-mono font-black uppercase py-3 border-2 border-black tracking-wider text-sm hover:bg-neutral-800 transition-colors flex items-center justify-center gap-2">
                    ⭐ ПЕРЕЙТИ К ОПЛАТЕ
                </button>
                <p class="text-[9px] text-neutral-400 text-center font-mono" id="tma-hint">
                    Вас перенаправит в Telegram
                </p>
            </div>
        </div>

    <script>
        const currentConfig = {
            material: 'plastic', shape: 'round', serial: '11111', 
            strap: 'plastic-solid', dialText: 'АДОХУИЩЩ'   
        };

        window.onload = () => renderConfiguredWatch();

        function calculateAndRenderPrice() {
            let basePrice = parseInt(currentConfig.serial);
            const standardTexts = ['АДОХУИЩЩ', 'БЕЗ ПЯТИ ШЕСТЬ УТРОВ', 'МНОГО', 'АЛЕ', 'ТРАКТОР', 'КОМБАЙН', 'МАШИНА'];
            const userText = currentConfig.dialText.trim().toUpperCase();
            if (userText && !standardTexts.includes(userText)) {
                basePrice += 6048;
                document.getElementById('custom-text-badge').classList.remove('hidden');
            } else {
                document.getElementById('custom-text-badge').classList.add('hidden');
            }
            if (currentConfig.material === 'metal') basePrice += 42; 
            if (currentConfig.strap.includes('segmented')) basePrice += 9; 
            document.getElementById('configurator-price-display').innerText = '⭐ ' + basePrice.toLocaleString('ru-RU');
            return basePrice;
        }

        function renderConfiguredWatch() {
            renderStrap(); renderCase(); renderDial(); renderSerial(); calculateAndRenderPrice();
        }

        function renderStrap() {
            const group = document.getElementById('svg-strap-group');
            group.innerHTML = ''; 
            let fillAttr = currentConfig.strap === 'fabric' ? 'url(#fabric-pattern)' : 
                          (currentConfig.strap.startsWith('metal') ? 'url(#metal-strap-grad)' : '#333333');
            const baseStrap = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            baseStrap.setAttribute('x', '84'); baseStrap.setAttribute('y', '10');
            baseStrap.setAttribute('width', '32'); baseStrap.setAttribute('height', '180');
            baseStrap.setAttribute('fill', fillAttr); baseStrap.setAttribute('rx', '2');
            baseStrap.setAttribute('stroke', '#000000'); baseStrap.setAttribute('stroke-width', '1.5');
            group.appendChild(baseStrap);

            if (currentConfig.strap.includes('segmented')) {
                const step = 15;
                for (let y = 15; y < 70; y += step) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', '84'); line.setAttribute('y1', y); line.setAttribute('x2', '116'); line.setAttribute('y2', y);
                    line.setAttribute('stroke', '#000000'); line.setAttribute('stroke-width', '1.5'); group.appendChild(line);
                }
                for (let y = 130; y < 190; y += step) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', '84'); line.setAttribute('y1', y); line.setAttribute('x2', '116'); line.setAttribute('y2', y);
                    line.setAttribute('stroke', '#000000'); line.setAttribute('stroke-width', '1.5'); group.appendChild(line);
                }
            }
        }

        function renderCase() {
            const group = document.getElementById('svg-case-group');
            group.innerHTML = ''; 
            let caseFill = currentConfig.material === 'metal' ? 'url(#metal-grad)' : 'url(#plastic-grad)';
            if (currentConfig.shape === 'round') {
                const mainCase = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                mainCase.setAttribute('cx', '100'); mainCase.setAttribute('cy', '100'); mainCase.setAttribute('r', '58');
                mainCase.setAttribute('fill', caseFill); mainCase.setAttribute('stroke', '#000'); mainCase.setAttribute('stroke-width', '3.5');
                group.appendChild(mainCase);
            } else {
                const mainCase = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                mainCase.setAttribute('x', '42'); mainCase.setAttribute('y', '42'); mainCase.setAttribute('width', '116');
                mainCase.setAttribute('height', '116'); mainCase.setAttribute('rx', '15'); mainCase.setAttribute('fill', caseFill);
                mainCase.setAttribute('stroke', '#000'); mainCase.setAttribute('stroke-width', '3.5');
                group.appendChild(mainCase);
            }
        }

        function renderDial() {
            const dialGroup = document.getElementById('svg-dial-group');
            dialGroup.innerHTML = ''; 
            const dialFace = document.createElementNS('http://www.w3.org/2000/svg', currentConfig.shape === 'round' ? 'circle' : 'rect');
            if(currentConfig.shape === 'round') { dialFace.setAttribute('cx', '100'); dialFace.setAttribute('cy', '100'); dialFace.setAttribute('r', '47'); }
            else { dialFace.setAttribute('x', '52'); dialFace.setAttribute('y', '52'); dialFace.setAttribute('width', '96'); dialFace.setAttribute('height', '96'); dialFace.setAttribute('rx', '8'); }
            dialFace.setAttribute('fill', '#ffffff'); dialFace.setAttribute('stroke', '#000'); dialFace.setAttribute('stroke-width', '1.5');
            dialGroup.appendChild(dialFace);

            const textGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            const userText = currentConfig.dialText.trim().toUpperCase();

            function drawCircleText(text) {
                const letters = [...text];
                letters.forEach((letter, i) => {
                    const angle = (i / letters.length) * 2 * Math.PI - Math.PI / 2;
                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', Math.round(100 + 34 * Math.cos(angle))); txt.setAttribute('y', Math.round(100 + 34 * Math.sin(angle)) + 5);
                    txt.setAttribute('font-family', "'Unbounded', sans-serif"); txt.setAttribute('font-weight', '900');
                    txt.setAttribute('font-size', '13'); txt.setAttribute('fill', '#000'); txt.setAttribute('text-anchor', 'middle');
                    txt.textContent = letter; textGroup.appendChild(txt);
                });
            }

            if (textLayout === 'circle' || userText === 'АДОХУИЩЩ') {
                if (userText === 'АДОХУИЩЩ' && textLayout === 'center') {
                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', '100'); txt.setAttribute('y', '107'); txt.setAttribute('font-family', "'Unbounded', sans-serif");
                    txt.setAttribute('font-weight', '900'); txt.setAttribute('font-size', '10'); txt.setAttribute('text-anchor', 'middle'); txt.textContent = userText; textGroup.appendChild(txt);
                } else drawCircleText(userText);
            } else {
                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', '100'); txt.setAttribute('y', '107'); txt.setAttribute('font-family', "'Unbounded', sans-serif");
                txt.setAttribute('font-weight', '900'); txt.setAttribute('font-size', userText.length > 6 ? '12' : '17');
                txt.setAttribute('text-anchor', 'middle'); txt.textContent = userText; textGroup.appendChild(txt);
            }
            dialGroup.appendChild(textGroup);

            if (handsVisible) {
                const arrow1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                arrow1.setAttribute('x1', '100'); arrow1.setAttribute('y1', '100'); arrow1.setAttribute('x2', '100'); arrow1.setAttribute('y2', '76'); arrow1.setAttribute('stroke', '#000'); arrow1.setAttribute('stroke-width', '4'); arrow1.setAttribute('stroke-linecap', 'round'); dialGroup.appendChild(arrow1);
                const arrow2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                arrow2.setAttribute('x1', '100'); arrow2.setAttribute('y1', '100'); arrow2.setAttribute('x2', '116'); arrow2.setAttribute('y2', '104'); arrow2.setAttribute('stroke', '#000'); arrow2.setAttribute('stroke-width', '4'); arrow2.setAttribute('stroke-linecap', 'round'); dialGroup.appendChild(arrow2);
            }
        }

        let handsVisible = true;
        function setHandsVisibility(visible) { handsVisible = visible; renderDial(); }

        let textLayout = 'center'; 
        function setTextLayout(mode) {
            textLayout = mode;
            document.getElementById('layout-center-btn').className = mode === 'center' ? 'py-1 px-2 text-[10px] font-mono font-bold uppercase border-2 border-black bg-black text-white' : 'py-1 px-2 text-[10px] font-mono font-bold uppercase border border-neutral-300 bg-white text-neutral-500';
            document.getElementById('layout-circle-btn').className = mode === 'circle' ? 'py-1 px-2 text-[10px] font-mono font-bold uppercase border-2 border-black bg-black text-white' : 'py-1 px-2 text-[10px] font-mono font-bold uppercase border border-neutral-300 bg-white text-neutral-500';
            renderDial();
        }

        function renderSerial() {
            const el = document.getElementById('svg-serial-engraving');
            el.textContent = `SER. ${currentConfig.serial}`; el.setAttribute('y', currentConfig.shape === 'square' ? '168' : '163');
        }

        function setCaseMaterial(mat) {
            currentConfig.material = mat;
            document.getElementById('opt-mat-plastic').className = mat === 'plastic' ? "py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white" : "py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white";
            document.getElementById('opt-mat-metal').className = mat === 'metal' ? "py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white" : "py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white";
            renderConfiguredWatch();
        }

        function setCaseShape(shape) {
            currentConfig.shape = shape;
            document.getElementById('opt-shape-round').className = shape === 'round' ? "py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white" : "py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white";
            document.getElementById('opt-shape-square').className = shape === 'square' ? "py-2 px-3 text-xs font-mono font-bold uppercase border-2 border-black bg-black text-white" : "py-2 px-3 text-xs font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white";
            renderConfiguredWatch();
        }

        let serialLocked = false;
        function setSerialCode(ser) {
            if (serialLocked) return;
            currentConfig.serial = ser;
            const serials = ['6043', '6401', '8080', '8407', '10101', '11111'];
            serials.forEach(s => {
                document.getElementById(`opt-serial-${s}`).className = s === ser ? `py-2 px-1 text-xs font-mono font-bold border-2 border-black bg-black text-white` : `py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white`;
            });
            serialLocked = true;
            serials.forEach(s => {
                if (s !== ser) { const btn = document.getElementById(`opt-serial-${s}`); btn.disabled = true; btn.className = `py-2 px-1 text-xs font-mono font-bold border border-neutral-200 text-neutral-300 bg-neutral-100 cursor-not-allowed`; }
            });
            document.getElementById('serial-lock-badge').classList.remove('hidden'); document.getElementById('serial-unlock-btn').classList.remove('hidden');
            renderConfiguredWatch();
        }

        function unlockSerial() {
            serialLocked = false;
            ['6043', '6401', '8080', '8407', '10101', '11111'].forEach(s => {
                const btn = document.getElementById(`opt-serial-${s}`); btn.disabled = false;
                btn.className = s === currentConfig.serial ? `py-2 px-1 text-xs font-mono font-bold border-2 border-black bg-black text-white` : `py-2 px-1 text-xs font-mono font-bold border border-neutral-300 text-neutral-400 bg-white`;
            });
            document.getElementById('serial-lock-badge').classList.add('hidden'); document.getElementById('serial-unlock-btn').classList.add('hidden');
        }

        function setStrapType(type) {
            currentConfig.strap = type;
            ['fabric', 'plastic-solid', 'plastic-segmented', 'metal-solid', 'metal-segmented'].forEach(st => {
                document.getElementById(`opt-strap-${st}`).className = st === type ? `py-2 px-1 text-[10px] font-mono font-bold uppercase border-2 border-black bg-black text-white` : `py-2 px-1 text-[10px] font-mono font-bold uppercase border border-neutral-300 text-neutral-400 bg-white`;
            });
            renderConfiguredWatch();
        }

        function updateConfiguratorDialText(text) {
            currentConfig.dialText = text.trim() ? text : 'АДОХУИЩЩ'; renderDial(); calculateAndRenderPrice();
        }

        function resetDialTextToDefault() {
            document.getElementById('configurator-text-input').value = ''; currentConfig.dialText = 'АДОХУИЩЩ'; renderDial(); calculateAndRenderPrice();
        }

        // ===== ФОРМИРОВАНИЕ ССЫЛКИ ДЛЯ STANDALONE СТРАНИЦЫ =====
        const TG_BOT_USERNAME = 'cheblyachas_bot';

        function openConfiguratorCheckout() {
            const price = calculateAndRenderPrice();
            document.getElementById('modal-model-name').innerText = currentConfig.dialText.toUpperCase();
            const matMap   = { metal: 'Сталь 316L', plastic: 'SLA-фотополимер' };
            const shapeMap = { round: 'Круглый', square: 'Квадратный' };
            const strapMap = { 'fabric': 'Тканевый NATO', 'plastic-solid': 'Пластик Solid', 'plastic-segmented':'Пластик Segmented', 'metal-solid': 'Металл Solid', 'metal-segmented': 'Металл Segmented' };

            document.getElementById('modal-model-details').innerHTML = `
                <div>• <strong>Материал:</strong> ${matMap[currentConfig.material]}</div>
                <div>• <strong>Форма:</strong> ${shapeMap[currentConfig.shape]}</div>
                <div>• <strong>Ремешок:</strong> ${strapMap[currentConfig.strap]}</div>
                <div>• <strong>Серийник:</strong> SER. ${currentConfig.serial}</div>
                <div class="mt-2 text-black font-mono text-sm border-t border-dashed border-neutral-400 pt-2 font-bold">
                    Итого: ⭐ ${price.toLocaleString('ru-RU')} Telegram Stars
                </div>
            `;
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function submitStandaloneOrder() {
            // УЛЬТРАСЖАТЫЙ ФОРМАТ {mat}{shape}{strap}{hands}{circle}{serial}-{text}
            // Гарантированно укладывается в 64 символа лимита Telegram
            const m = currentConfig.material === 'plastic' ? 'p' : 'm';
            const s = currentConfig.shape === 'round' ? 'r' : 's';
            const strapMap = {'fabric':'fa', 'plastic-solid':'ps', 'plastic-segmented':'pg', 'metal-solid':'ms', 'metal-segmented':'mg'};
            const r = strapMap[currentConfig.strap];
            const h = handsVisible ? '1' : '0';
            const c = textLayout === 'circle' ? '1' : '0';
            const ser = currentConfig.serial;
            const text = currentConfig.dialText.trim().toUpperCase().substring(0, 12); // ограничение для влезания в лимит

            const payload = `${m}${s}${r}${h}${c}${ser}-${text}`;

            // Кодируем в URL-safe base64
            const b64 = btoa(unescape(encodeURIComponent(payload)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

            // Редиректим прямиком в телеграм (работает и на мобилках, и на десктопе)
            window.location.href = `https://t.me/${TG_BOT_USERNAME}?start=${b64}`;
        }

        function closeCheckout() {
            document.getElementById('checkout-modal').classList.add('hidden');
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const thumb = document.getElementById('dark-thumb');
            thumb.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('cheblyachas-theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('cheblyachas-theme') === 'dark') {
            document.body.classList.add('dark');
            document.addEventListener('DOMContentLoaded', () => { document.getElementById('dark-thumb').textContent = '🌙'; });
        }
    </script>
</body>
</html>
